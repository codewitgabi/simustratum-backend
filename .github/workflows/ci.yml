name: CI/CD

on:
  push:
    branches:
      - release

concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # conftest.py already provides safe defaults for every env var the app
      # needs (dummy JWT secret, dummy API keys, etc.) and creates the
      # simustratum_test database on the service container above by itself —
      # nothing extra to wire up here.
      - name: Run test suite
        run: uv run pytest tests -q

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Write production .env
        run: |
          cat > .env.production <<'EOF'
          ${{ secrets.PRODUCTION_ENV_FILE }}
          EOF

      - name: Upload .env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ vars.EC2_SSH_PORT || 22 }}
          source: ".env.production"
          target: ${{ vars.EC2_DEPLOY_PATH }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ vars.EC2_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ vars.EC2_DEPLOY_PATH }}"

            # .env is gitignored, so `git reset --hard` below never touches it
            mv .env.production .env

            git fetch origin release
            git reset --hard origin/release

            # pick up uv's PATH if it's not already on this non-login shell
            source "$HOME/.local/bin/env" 2>/dev/null || true

            uv sync --frozen
            uv run python scripts/migrate.py upgrade head

            sudo systemctl restart fastapi.service

            for i in $(seq 1 10); do
              if curl -fsS http://localhost:8000/health/db; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for service to come up... ($i/10)"
              sleep 3
            done

            echo "Service did not become healthy in time. Recent logs:"
            sudo systemctl status fastapi.service --no-pager || true
            sudo journalctl -u fastapi.service -n 80 --no-pager || true
            exit 1
